<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>충전-영혼 데미지 비교기</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f2f2f2;
    }

    .header {
      text-align: center;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    select, input[type="text"], button {
      width: 100%;
      height: 44px;
      font-size: 16px;
      margin: 6px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>

  <script>
    function cal() {
      var mod1 = Number(document.getElementById("mod1").value);
      var mod2 = Number(document.getElementById("mod2").value);
      var clas1 = Number(document.getElementById("clas1").value);
      var clas2 = Number(document.getElementById("clas2").value);
      var lev1 = Number(document.getElementById("lev1").value);
      var lev2 = Number(document.getElementById("lev2").value);
      var stack = Number(document.getElementById("stack").value);
      var res = 0;

      if (isNaN(clas1) || isNaN(clas2) || isNaN(lev1) || isNaN(lev2) || isNaN(stack)) {
        alert("숫자만 입력하세요.");
        return;
      }

      clas1 -= 7;
      lev2 -= 1;
      clas2 -= 7;

      if (mod1 == 1) {
        if (mod2 == 1) {
          var dam1 = (300 + 30 * clas1 - 5 * lev1 + 5 * lev1 * lev1);
          var dam2 = (30 + (60 + 20 * clas2 + 20 * lev2) * (stack - 1));
          while (dam1 > dam2) {
            stack += 1;
            dam2 = (30 + (60 + 20 * clas2 + 20 * lev2) * (stack - 1));
          }
          res = stack;
        } else {
          var dam2 = (300 + 30 * clas1 - 5 * lev1 + 5 * lev1 * lev1);
          var dam1 = (30 + (60 + 20 * clas2 + 20 * lev2) * (stack - 1));
          while (dam1 > dam2) {
            lev1 += 1;
            dam2 = (300 + 30 * clas1 - 5 * lev1 + 5 * lev1 * lev1);
          }
          res = lev1;
        }
      } else {
        if (mod2 == 1) {
          var dam1 = (300 + 30 * clas1 - 5 * lev1 + 5 * lev1 * lev1) / 1.3;
          var dam2 = (30 + (60 + 20 * clas2 + 20 * lev2) * (stack - 1)) * 2;
          while (dam1 > dam2) {
            stack += 1;
            dam2 = (30 + (60 + 20 * clas2 + 20 * lev2) * (stack - 1)) * 2;
          }
          res = stack;
        } else {
          var dam2 = (300 + 30 * clas1 - 5 * lev1 + 5 * lev1 * lev1);
          var dam1 = (30 + (60 + 20 * clas2 + 20 * lev2) * (stack - 1));
          while (dam1 > dam2) {
            lev1 += 1;
            dam2 = (300 + 30 * clas1 - 5 * lev1 + 5 * lev1 * lev1);
          }
          res = lev1;
        }
      }

      document.getElementById("res").value = res;
    }
  </script>
</head>

<body>

  <div class="header">
    <img src="img3.PNG" width="60" alt="">
    <div>충전-영혼 딜 비교 계산기</div>
  </div>

  <div class="container">

    비교 방식:
    <select id="mod1">
      <option value="1">깡딜</option>
      <option value="2">DPS</option>
    </select>

    기준 선택:
    <select id="mod2">
      <option value="1">영혼수집</option>
      <option value="2">충전</option>
    </select>

    충전 클래스:
    <select id="clas1">
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
      <option value="13">13</option>
      <option value="14">14</option>
      <option value="15">15</option>
    </select>

    영혼수집 클래스:
    <select id="clas2">
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
      <option value="13">13</option>
      <option value="14">14</option>
      <option value="15">15</option>
    </select>

    충전 레벨:
    <input type="text" id="lev1">

    영혼수집 레벨:
    <input type="text" id="lev2">

    영혼수집 스택:
    <input type="text" id="stack">

    <button onclick="cal()">계산하기</button>

    <div class="result">
      결과 (레벨 / 스택):
      <input type="text" id="res" readonly>
    </div>

  </div>

</body>
</html>
