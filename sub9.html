<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메두사-해일 최적 사이클 계산기</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #f2f2f2;
}

.header {
  text-align: center;
  font-size: 40px;
  margin-bottom: 20px;
}

    .calculator-container {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  box-sizing: border-box;
  padding: 10px; /* 🔥 모바일 여백 */
}

/* 입력 요소 */
select, input[type="text"], input[type="button"], textarea {
  width: 100%;
  height: 44px; /* 🔥 터치 최적화 */
  font-size: 16px; /* 🔥 iOS 확대 방지 */
  margin: 6px 0;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

/* 버튼만 따로 강조 */
input[type="button"] {
  font-weight: bold;
}

/* 🔥 결과창 (순서) */
textarea {
  height: auto;
  min-height: 80px;
  resize: none;
  white-space: pre-wrap;
  line-height: 1.4;
}

/* 🔥 모바일 최적화 */
@media (max-width: 768px) {

  .calculator-container {
    padding: 8px;
  }

  /* 🔥 한 줄 구조 강제 해제 */
  .calculator-input {
    display: block;
  }

  .calculator-input input,
  .calculator-input select {
    width: 100%;
  }

}

/* 🔥 PC에서만 가로 배치 */
@media (min-width: 768px) {

  .calculator-input {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .calculator-input input,
  .calculator-input select {
    width: auto;
    flex: 1;
  }
}
button {
  background-color: #4CAF50;
  color: white;
  border: none;
}
</style>

<script>
function calc(){

  let m_clas = Number(document.getElementById("m_clas").value) - 7;
  let m_lev = Number(document.getElementById("m_lev").value) - 1;
  let w_clas = Number(document.getElementById("w_clas").value) - 7;

  // 🔥 비율 계산
  let medusaPercent = 0.11 + 0.01 * m_clas + 0.01 * m_lev;
  let curPercent = 0.11 + 0.005 * w_clas;
  let lostPercent = 0.36 + 0.04 * w_clas;

  let hp = 1;
  let count = 0;
  let sequence = "";

  // 🔥 그리디 최적 선택
  while(hp > 0){

    let medusaDmg = hp * medusaPercent;

    let waveDmg = Math.max(
      hp * curPercent,
      (1 - hp) * lostPercent
    );

    if(medusaDmg >= waveDmg){
      hp -= medusaDmg;
      sequence += "메두사 → ";
    } else {
      hp -= waveDmg;
      sequence += "해일 → ";
    }

    count++;

    if(hp < 1e-9){
      hp = 0;
      break;
    }

    if(count > 1000) break;
  }

  if(sequence.length > 0){
    sequence = sequence.slice(0, -3);
  }

  document.getElementById("res1").value = count + "회";
  document.getElementById("res2").value = sequence;
}
</script>

</head>

<body>

<div class="header">메두사-해일 최적 사이클</div>

<div class="container">

<h3>메두사</h3>
<label>클래스</label>
<select id="m_clas">
  <option>7</option><option>8</option><option>9</option>
  <option>10</option><option>11</option><option>12</option>
  <option>13</option><option>14</option><option>15</option>
</select>

<label>레벨</label>
<select id="m_lev">
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option>
</select>

<h3>해일</h3>
<label>클래스</label>
<select id="w_clas">
  <option>7</option><option>8</option><option>9</option>
  <option>10</option><option>11</option><option>12</option>
  <option>13</option><option>14</option><option>15</option>
</select>

<button onclick="calc()">최적 계산</button>

<br><br>

총 공격 횟수:
<input type="text" id="res1">

공격 순서:
<input type="text" id="res2">

</div>

</body>
</html>
