<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메두사-해일 최적 사이클 계산기</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #f2f2f2;
}

.header {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

select, input[type="text"], button, textarea {
  width: 100%;
  height: 44px;
  font-size: 16px;
  margin: 6px 0;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  background-color: #4CAF50;
  color: white;
  font-weight: bold;
  border: none;
  cursor: pointer;
}

button:hover {
  background-color: #45a049;
}

textarea {
  height: auto;
  min-height: 80px;
  resize: none;
  white-space: pre-wrap;
}

.result {
  margin-top: 10px;
}
</style>

<script>
function calc(){

  let m_clas = Number(document.getElementById("m_clas").value) - 7;
  let m_lev = Number(document.getElementById("m_lev").value) - 1;
  let w_clas = Number(document.getElementById("w_clas").value) - 7;

  let medusaPercent = 0.11 + 0.01 * m_clas + 0.01 * m_lev;
  let curPercent = 0.11 + 0.005 * w_clas;
  let lostPercent = 0.36 + 0.04 * w_clas;

  let hp = 1;
  let count = 0;
  let medusaCount = 0; // 🔥 메두사 횟수 따로
  let waveCount = 0;   // 🔥 해일 횟수 따로
  let sequence = "";

  while(hp > 0){

    let medusaDmg = hp * medusaPercent;

    let waveDmg = Math.max(
      hp * curPercent,
      (1 - hp) * lostPercent
    );

    if(medusaDmg >= waveDmg){
      hp -= medusaDmg;
      sequence += "메두사 → ";
      medusaCount++;
    } else {
      hp -= waveDmg;
      sequence += "해일 → ";
      waveCount++;
    }

    count++;

    if(hp < 1e-9){
      hp = 0;
      break;
    }

    if(count > 1000) break;
  }

  if(sequence.length > 0){
    sequence = sequence.slice(0, -3);
  }

  document.getElementById("res_total").value = count + "회";
  document.getElementById("res_medusa").value = medusaCount + "회";
  document.getElementById("res_wave").value = waveCount + "회";
  document.getElementById("res_seq").value = sequence;
}
</script>

</head>

<body>

<div class="header">
  메두사-해일 최적 사이클 계산기
</div>

<div class="container">

<h3>메두사</h3>

클래스
<select id="m_clas">
  <option>7</option><option>8</option><option>9</option>
  <option>10</option><option>11</option><option>12</option>
  <option>13</option><option>14</option><option>15</option>
</select>

레벨
<select id="m_lev">
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option>
</select>

<h3>해일</h3>

클래스
<select id="w_clas">
  <option>7</option><option>8</option><option>9</option>
  <option>10</option><option>11</option><option>12</option>
  <option>13</option><option>14</option><option>15</option>
</select>

<button onclick="calc()">최적 계산</button>

<div class="result">
총 공격 횟수:
<input type="text" id="res_total" readonly>

메두사 사용 횟수:
<input type="text" id="res_medusa" readonly>

해일 사용 횟수:
<input type="text" id="res_wave" readonly>

공격 순서:
<textarea id="res_seq" readonly></textarea>
</div>

</div>

</body>
</html>
