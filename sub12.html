<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웨이브 카드 계산기</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #f2f2f2;
}

.header {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

select, input[type="number"], button {
  width: 100%;
  height: 44px;
  font-size: 16px;
  margin: 6px 0;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  background-color: #4CAF50;
  color: white;
  font-weight: bold;
  border: none;
  height: 50px;
  font-size: 18px;
}

.result {
  margin-top: 20px;
}

.big-result {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  margin-top: 10px;
}

.label {
  margin-top: 15px;
  font-size: 16px;
  color: #555;
}
</style>

<script>
function getCards(n) {
  let base;

  if (n <= 45) {
    const pattern = [1,1,2,1,3];
    base = pattern[(n - 1) % 5];
  } else {
    base = (n % 2 === 1) ? 6 : 2;
  }

  let mult = 1;
  if (n >= 112) mult = 2;
  if (n >= 501) mult = 3;
  if (n >= 1001) mult = 4;
  if (n >= 1501) mult = 5;

  return base * mult;
}

function calc(){
  let wave = Number(document.getElementById("wave").value);

  if (!wave || wave < 1) {
    alert("올바른 웨이브 입력");
    return;
  }

  let total = 0;
  for(let i=1;i<=wave;i++){
    total += getCards(i);
  }

  document.getElementById("per").innerText = getCards(wave) + "장";
  document.getElementById("total").innerText = total + "장";
}
</script>

</head>

<body>

<div class="header">
  웨이브 카드 계산기
</div>

<div class="container">

<h3>입력</h3>

<label>웨이브</label>
<input type="number" id="wave">

<button onclick="calc()">계산</button>

<div class="result">

<div class="label">이번 웨이브 카드</div>
<div class="big-result" id="per">-</div>

<div class="label">누적 카드</div>
<div class="big-result" id="total">-</div>

</div>

</div>

</body>
</html>
