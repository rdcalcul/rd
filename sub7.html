<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태극 시간 개수 계산기</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f2f2f2;
    }

    .header {
      text-align: center;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    select, input[type="text"], button {
      width: 100%;
      height: 44px;
      font-size: 16px;
      margin: 6px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>

  <script>
    function cal() {
      var clas1 = Number(document.getElementById("clas").value);
      var clas2 = Number(document.getElementById("clas2").value);
      var lev1 = Number(document.getElementById("lev").value);
      var lev2 = Number(document.getElementById("lev2").value);

      lev1 -= 1;
      clas1 -= 7;
      lev2 -= 1;
      clas2 -= 7;

      var atspd = (120 + clas1 * 30 + lev1 * 20) / 100;
      var a = 1;

      while (95 - (atspd + a * (2 + lev2 + clas2)) >= 0) {
        a += 1;
      }

      document.getElementById("res").value = a;
    }
  </script>
</head>

<body>

  <div class="header">
    <img src="img3.PNG" width="60" alt="">
    <div>태극 시간 개수 계산기</div>
  </div>

  <div class="container">

    태극 주사위 클래스:
    <select id="clas">
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
      <option value="13">13</option>
      <option value="14">14</option>
      <option value="15">15</option>
    </select>

    태극 파워업 레벨:
    <select id="lev">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>

    시간 주사위 클래스:
    <select id="clas2">
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
      <option value="13">13</option>
      <option value="14">14</option>
      <option value="15">15</option>
    </select>

    시간 파워업 레벨:
    <select id="lev2">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>

    <button onclick="cal()">계산하기</button>

    <div class="result">
      필요한 시간 주사위 개수:
      <input type="text" id="res" readonly>
    </div>

  </div>

</body>
</html>
