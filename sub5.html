<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>크리티컬 계산기</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f2f2f2;
    }

    .header {
      text-align: center;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    select, input[type="text"], button {
      width: 100%;
      height: 44px;
      font-size: 16px;
      margin: 6px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>

  <script>
    function cal() {
      var v1 = Number(document.getElementById("v1").value);
      var v2 = Number(document.getElementById("v2").value);
      var res = 0;

      if (v1 !== 0) {
        res = (v2 / v1) * 100;
      }

      document.getElementById("res").value = Math.floor(res);
    }
  </script>
</head>

<body>

  <div class="header">
    <img src="img4.jpg" width="60" alt="">
    <div>크리티컬 계산기</div>
  </div>

  <div class="container">

    일반 데미지:
    <input type="text" id="v1">

    크리티컬 데미지:
    <input type="text" id="v2">

    <button onclick="cal()">계산하기</button>

    <div class="result">
      상대 크리티컬:
      <input type="text" id="res" readonly>
    </div>

  </div>

</body>

</html>
