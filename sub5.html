<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <title>크리티컬 계산기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f2f2f2;
    }

    .header {
      text-align: center;
      font-size: 2em;
    }

    .calculator-container {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  box-sizing: border-box;
}

/* 입력 요소 전부 */
select, input[type="text"], input[type="button"] {
  width: 100%;
  height: 40px;
  font-size: 1em;
  margin: 5px 0;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 5px;
  box-sizing: border-box;
}

/* PC에서는 가로 배치 유지하고 싶으면 */
@media (min-width: 768px) {
  .calculator-input {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .calculator-input input {
    width: auto;
    flex: 1;
  }
}

    input[type="button"] {
      background-color: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1.2em; /* Adjusted font size */
    }

    input[type="button"]:hover {
      background-color: #45a049;
    }

    .result {
      font-size: 1.2em;
      margin-top: 10px;
    }
  </style>
  <script>
    function cal() {
      var v1 = Number(document.getElementById("v1").value);
      var v2 = Number(document.getElementById("v2").value);
      var res = 0;

      if (v1 !== 0) {
        res = (v2 / v1) * 100;
      }

      document.getElementById("res").value = Math.floor(res);
    }
  </script>
</head>

<body>
  <div class="header">
    <img src="img4.jpg" height="50" alt="크리티컬 계산기">
    <font size=7>크리티컬 계산기!</font>
  </div>
  <div class="calculator-container">
    <div class="calculator-input">
      일반 데미지:
      <input type="text" id="v1">
    </div>
    <div class="calculator-input">
      크리티컬 데미지:
      <input type="text" id="v2">
    </div>
    <div class="result">
      상대 크리티컬:
      <input type="text" id="res">
    </div>
    <div class="calculator-input">
      <input type="button" value="계산하기" onclick="cal()">
    </div>
  </div>
</body>

</html>
