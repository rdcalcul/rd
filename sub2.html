<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딜량 계산기</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #f2f2f2;
}

.header {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

select, input[type="text"], button {
  width: 100%;
  height: 44px;
  font-size: 16px;
  margin: 6px 0;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  background-color: #4CAF50;
  color: white;
  font-weight: bold;
  border: none;
}

.result {
  margin-top: 15px;
  font-size: 18px;
}
</style>

<script>
// 🔥 기존 로직 그대로 유지
function numberToKorean(number) {
  var inputNumber = number < 0 ? false : number;
  var unitWords = ["", "만", "억", "조", "경", "해", "자","양", "구", "간", "정", "재", "극", "향하사", "아승기", "나유타", "불가사의", "무량대수", "겁", "훈공"];
  var splitUnit = 10000;
  var splitCount = unitWords.length;
  var resultArray = [];
  var resultString = "";

  if(inputNumber>=10**80){
    var a=0;
    while(inputNumber>=10){
      inputNumber/=10;
      a+=1;
    }
    resultString=String(inputNumber)+"×10^"+String(a);
  } else {
    for (var i = 0; i < splitCount; i++) {
      var unitResult =
        (inputNumber % Math.pow(splitUnit, i + 1)) / Math.pow(splitUnit, i);
      unitResult = Math.floor(unitResult);
      if (unitResult > 0) {
        resultArray[i] = unitResult;
      }
    }
    for (var i = 0; i < resultArray.length; i++) {
      if (!resultArray[i]) continue;
      resultString = String(resultArray[i]) + unitWords[i] + resultString;
    }
  }
  return resultString;
}

function cal() {
  var crit = Number(document.getElementById("crit").value);
  var dill = document.getElementById("dill").value;
  var clas = Number(document.getElementById("clas").value);
  var dal = document.getElementById("dal").value;
  var stack = Number(document.getElementById("stack").value);
  var lev = Number(document.getElementById("lev").value);
  var lcs = Number(document.getElementById("lcs").value);
  var leye = Number(document.getElementById("leye").value);
  var deye = Number(document.getElementById("deye").value);
  var b=Number(document.getElementById("b").value);
  var bcl=Number(document.getElementById("bcl").value);
  var bpw=Number(document.getElementById("bpw").value);
  var bbt=Number(document.getElementById("bbt").value);

  var dam;
  clas -= 7;
  lev -= 1;
  bpw-=1;

  var atspd = lcs * leye +8;
  if (atspd > 95) atspd = 95;

  lev -= 1;
  crit /= 100;

  // 🔥 이하 전부 기존 그대로
  if (dal == 1) {
    if (dill == "sav") {
      dam = 100 + 20 * lev + clas * 10;
      dam = dam * (125 + clas)**stack / 100 + stack*dam;
      dam/=0.8;
    }
    if (dill == "ovl") {
      dam = 400;
      while (stack > 0) {
        dam = dam + dam * (0.3 + 0.01 * clas);
        stack--;
        crit = crit + crit * (0.4 + 0.01 * clas);
      }
      dam /= 1.7;
      crit /= 1.7;
    }
    if (dill == "rech") {
      dam = (300 - 30 * clas + 5 * stack * (stack - 1)) / 1.3;
    }
    if (dill == "sym") {
      dam = (30 + (60 + 20 * clas + 20 * lev) * (stack - 1)) * 2;
    }
    if (dill == "combo") {
      dam = ((8 + lev + 2 * clas) * (stack + 1) * stack / 2 + 50 * lev + 10 * clas) * 5 / 6;
    }

    let moonRate = 0.05+0.05*leye
    let bubbleRate = 0.05 + (bbt * (10 + (bcl - 7) * 3 + bpw * 3) / 100);
    let rate = Math.max(moonRate, bubbleRate);

    if (atspd * 1.03 > 95) {
      dam = ((rate * dam * crit + dam * (1 - rate)) + (rate * dam * crit + dam * (1 - rate)) * leye * 0.1) / 0.05;
    } else {
      dam = ((rate * dam * crit + dam * (1 - rate)) + (rate * dam * crit + dam * (1 - rate)) * leye * 0.1) / (1 - atspd * 1.03 / 100);
    }
  }

  if (dal == 2) {
    if (dill == "sav") {
      dam = 100 + 20 * lev + clas * 10;
      while (stack > 0) {
        dam = dam * (125 + clas) / 100 + dam;
        stack--;
      }
    }
    if (dill == "ovl") {
      dam = 400;
      while (stack > 0) {
        dam = dam + dam * (0.3 + 0.01 * clas);
        stack--;
        crit = crit + crit * (0.4 + 0.01 * clas);
      }
      dam /= 1.7;
      crit /= 1.7;
    }
    if (dill == "rech") {
      dam = (300 + 30 * clas + 5 * stack * (stack - 1)) / 1.3;
    }
    if (dill == "sym") {
      dam = (30 + (60 + 20 * clas + 20 * lev) * (stack - 1)) * 2;
    }
    if (dill == "combo") {
      dam = ((8 + lev + 2 * clas) * (stack + 1) * stack / 2 + 50 * lev + 10 * clas) * 5 / 6;
    }

    if(b==0){
      dam = (0.95 * dam + dam * crit * 0.05) / (1 - atspd / 100);
    } else {
      dam=(bbt*(10+(bcl-7)*3+bpw*3)/100 * dam + dam * crit * (1-bbt*(10+(bcl-7)*3+bpw*3))/100) / (1 - atspd / 100);
    }
  }

  if (dal == 3) {
    if (dill == "sav") {
      dam = 100 + clas * 10;
      while (stack > 0) {
        dam = dam * (125 + clas) / 100 + dam;
        stack--;
      }
    }
    if (dill == "ovl") {
      dam = 400;
      while (stack > 0) {
        dam = dam + dam * (0.3 + 0.01 * clas);
        stack--;
        crit = crit + crit * (0.4 + 0.01 * clas);
      }
      dam /= 1.7;
      crit /= 1.7;
    }
    if (dill == "rech") {
      dam = (300 + 30 * clas + 5 * stack * (stack - 1)) / 1.3;
    }
    if (dill == "sym") {
      dam = (30 + (60 + 20 * lev + 20 * clas) * (stack - 1)) * 2;
    }
    if (dill == "combo") {
      dam=((8 + lev + 2 * clas) * (stack + 1) * stack / 2 + 50 * lev + 10 * clas) * 5 / 6;  
    }
  }

  dam = Math.floor(deye * dam);
  document.getElementById("res").value = numberToKorean(dam);
}
</script>

</head>

<body>

<div class="header">
  딜량(DPS) 계산기
</div>

<div class="container">

<h3>기본 설정</h3>

<label>크리티컬 (%)</label>
<input type="text" id="crit">

<label>딜 주사위</label>
<select id="dill">
  <option value="void">선택하세요</option>
  <option value="sav">수호자</option>
  <option value="ovl">과열</option>
  <option value="rech">충전</option>
  <option value="sym">영혼수집</option>
  <option value="combo">콤보</option>
</select>

<label>클래스</label>
<select id="clas">
  <option>7</option><option>8</option><option>9</option>
  <option>10</option><option>11</option><option>12</option>
  <option>13</option><option>14</option><option>15</option>
</select>

<label>눈금</label>
<select id="deye">
  <option value="1">1</option><option value="2">2</option>
  <option value="3">3</option><option value="4">4</option>
  <option value="5">5</option><option value="6">6</option>
  <option value="7">7</option>
</select>

<label>파워업</label>
<select id="lev">
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option>
</select>

<label>스택</label>
<input type="text" id="stack">

<h3>달 주사위</h3>

<select id="dal">
  <option value="1">활성화</option>
  <option value="2">비활성</option>
  <option value="3">없음</option>
</select>

<label>클래스</label>
<select id="lcs">
  <option>7</option><option>8</option><option>9</option>
  <option>10</option><option>11</option><option>12</option>
  <option>13</option><option>14</option><option>15</option>
</select>

<label>눈금</label>
<select id="leye">
  <option value="1">1</option><option value="2">2</option>
  <option value="3">3</option><option value="4">4</option>
  <option value="5">5</option><option value="6">6</option>
  <option value="7">7</option>
</select>

<h3>비눗방울</h3>

<select id="b">
  <option value="1">있음</option>
  <option value="0">없음</option>
</select>

<label>클래스</label>
<select id="bcl">
  <option>7</option><option>8</option><option>9</option>
  <option>10</option><option>11</option><option>12</option>
  <option>13</option><option>14</option><option>15</option>
</select>

<label>파워업</label>
<select id="bpw">
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option>
</select>

<label>특성</label>
<select id="bbt">
  <option value="2">있음</option>
  <option value="1">없음</option>
</select>

<button onclick="cal()">계산</button>

<div class="result">
결과:
<input type="text" id="res" readonly>
</div>

</div>

</body>
</html>
