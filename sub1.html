<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뽑스피 계산기</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #f2f2f2;
}

.header {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

select, input[type="text"], button {
  width: 100%;
  height: 44px;
  font-size: 16px;
  margin: 6px 0;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  background-color: #4CAF50;
  color: white;
  font-weight: bold;
  border: none;
}

.result {
  margin-top: 15px;
  font-size: 18px;
}

  </style>
  <script>
    function cal() {
        var v1 = Number(document.getElementById("v1").value);
        var v2 = Number(document.getElementById("v2").value);
        var res = 0;
        while((v1-v2)<=0){
            v2=v2-v1;
            v1=v1+10;
            res=res+1;
        }
        document.getElementById("res").value = res;
    }
  </script>
</head>
<body>
  <div class="header">
    <img src="img2.PNG" width="50" height="50" alt="뽑스피 계산기">
    <span style="font-size: 1.5em; color: #333;">뽑을 수 있는 횟수 계산기!</span>
  </div>
  <div class="calculator-container">
    <div class="calculator-input">
      뽑스피: 
      <input type="text" id="v1">
    </div>
    <div class="calculator-input">
      보유 SP: 
      <input type="text" id="v2">
    </div>
    <div class="calculator-input result">
      뽑을 수 있는 횟수: 
      <input type="text" id="res" readonly>
    </div>
    <input type="button" value="계산하기" onclick="cal()">
  </div>
</body>
</html>
