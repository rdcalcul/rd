<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뽑스피 계산기</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #f2f2f2;
}

.header {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

select, input[type="text"], button {
  width: 100%;
  height: 44px;
  font-size: 16px;
  margin: 6px 0;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  background-color: #4CAF50;
  color: white;
  font-weight: bold;
  border: none;
}

.result {
  margin-top: 15px;
  font-size: 18px;
}
</style>

<script>
function calc(){

  let v1 = Number(document.getElementById("v1").value);
  let v2 = Number(document.getElementById("v2").value);
  let res = 0;

  while((v1 - v2) <= 0){
    v2 = v2 - v1;
    v1 = v1 + 10;
    res++;
  }

  document.getElementById("res").value = res + "회";
}
</script>

</head>

<body>

<div class="header">
  뽑스피 계산기
</div>

<div class="container">

<h3>입력</h3>

<label>뽑스피</label>
<input type="text" id="v1">

<label>보유 SP</label>
<input type="text" id="v2">

<button onclick="calc()">계산</button>

<div class="result">
결과:
<input type="text" id="res" readonly>
</div>

</div>

</body>
</html>
